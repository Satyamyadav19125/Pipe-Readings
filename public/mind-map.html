<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PVC Pipe Readings — Mind Map</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(ellipse at center, #0a1628 0%, #050d1a 100%);
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden; width: 100vw; height: 100vh; color: #e2e8f0;
}
#header {
  position: fixed; top: 0; left: 0; right: 0; height: 52px;
  background: rgba(5,13,26,0.92); border-bottom: 1px solid rgba(34,197,94,0.3);
  backdrop-filter: blur(12px); display: flex; align-items: center;
  padding: 0 18px; gap: 14px; z-index: 100;
}
#header h1 { font-size: 15px; color: #22c55e; font-weight: 700; letter-spacing: .4px; }
#header p { font-size: 11px; color: #475569; }
.btn-group { margin-left: auto; display: flex; gap: 6px; }
.btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8; padding: 5px 12px; border-radius: 6px; cursor: pointer;
  font-size: 11px; transition: all .2s;
}
.btn:hover { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #22c55e; }
#hint {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: #64748b; background: rgba(5,13,26,0.85);
  padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06);
  pointer-events: none; z-index: 100; text-align: center;
}
svg { width: 100vw; height: 100vh; cursor: grab; }
svg:active { cursor: grabbing; }
.link { fill: none; stroke-width: 1.5px; transition: stroke .3s; }
.node { cursor: pointer; }
.node circle { transition: r .3s, filter .3s; }
.node text { pointer-events: none; dominant-baseline: middle; }
.node-d0 circle { fill: #15803d; stroke: #22c55e; stroke-width: 2.5px; }
.node-d0 text   { font-size: 14px; fill: #22c55e; font-weight: 700; }
.node-d1 circle { fill: #1e3a5f; stroke: #3b82f6; stroke-width: 1.8px; }
.node-d1 text   { font-size: 12.5px; fill: #93c5fd; font-weight: 600; }
.node-d2 circle { fill: #1a3d2b; stroke: #4ade80; stroke-width: 1.5px; }
.node-d2 text   { font-size: 11.5px; fill: #86efac; }
.node-d3 circle { fill: #1e2d3d; stroke: #64748b; stroke-width: 1px; }
.node-d3 text   { fill: #94a3b8; font-size: 11px; }
.node:hover circle { filter: brightness(1.35) drop-shadow(0 0 6px currentColor); }
.collapse-ring { fill: none; stroke-width: 2px; opacity: .6; }
#tooltip {
  position: fixed; background: rgba(15,23,42,0.96);
  border: 1px solid rgba(34,197,94,0.4); border-radius: 8px; padding: 8px 13px;
  font-size: 12px; color: #e2e8f0; pointer-events: none; max-width: 300px;
  line-height: 1.5; z-index: 200; opacity: 0; transition: opacity .15s;
}
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>💧 PVC Pipe Readings</h1>
    <p>Digital Village Project · Kharif 26 · AWD monitoring, Punjab</p>
  </div>
  <div class="btn-group">
    <button class="btn" onclick="expandAll()">Expand All</button>
    <button class="btn" onclick="collapseAll()">Collapse All</button>
    <button class="btn" onclick="resetZoom()">Reset View</button>
  </div>
</div>

<svg id="svg"><g id="zoom-g"><g id="links-g"></g><g id="nodes-g"></g></g></svg>
<div id="tooltip"></div>
<div id="hint">🖱 Scroll to zoom · Drag to pan · Tap a node to grow its roots</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// The BASE (trunk) is the tool itself; each tap grows the roots deeper,
// from where the data is born all the way to what you see on screen.
const RAW = {
  name: "PVC Pipe\nReadings Tool", icon: "💧",
  info: "Live dashboard for AWD pipe water-level monitoring — tap the roots to explore.",
  children: [
    { name: "1 · The Field", icon: "🌾", info: "Where every reading is born.", children: [
      { name: "Surveyor at the pipe", icon: "🧑‍🌾", children: [
        { name: "Opens Kobo form\non the phone" },
        { name: "Village → Farm → Pipe\ncascading choice" },
        { name: "~1,188 pipes\nacross all villages" }
      ]},
      { name: "Measurements", icon: "📏", children: [
        { name: "Outside height (mm)\nstandard: 150" },
        { name: "Inside water level (mm)\nvalid: 50–250" },
        { name: "Start + end time\nof the visit" }
      ]},
      { name: "Evidence", icon: "📷", children: [
        { name: "Reading photo\n(tape in pipe)" },
        { name: "Field photo" },
        { name: "GPS auto-captured\nat the pipe" }
      ]}
    ]},
    { name: "2 · Data Journey", icon: "🔄", info: "How a submission reaches your screen.", children: [
      { name: "Webhook (instant)", icon: "⚡", children: [
        { name: "Kobo REST Service POSTs to\n/api/webhook?secret=…" },
        { name: "Cache busted →\nnew reading in seconds" },
        { name: "Failure emails = webhook URL\npoints at old deployment" }
      ]},
      { name: "30-second cache", icon: "⏱️", children: [
        { name: "Pages fetch Kobo API\nwith the API token" },
        { name: "Never more than\n~30 s behind" }
      ]},
      { name: "Master list", icon: "🧠", children: [
        { name: "Form choice lists =\nEVERY village + pipe" },
        { name: "Pipes with 0 readings\nstill counted (95/1188)" }
      ]},
      { name: "Manual ↻ Refresh", icon: "🔘" }
    ]},
    { name: "3 · Storage", icon: "🗄️", info: "What lives where — Kobo keeps the readings, Mongo keeps the tool's own data.", children: [
      { name: "KoboToolbox", icon: "☁️", children: [
        { name: "Source of truth:\nreadings + photos" },
        { name: "Dashboard reads live,\nnever copies" }
      ]},
      { name: "MongoDB: pipe_readings", icon: "🍃", children: [
        { name: "settings — standards,\nflags, contacts, passwords" },
        { name: "assignments — surveyors\n+ villages + logins" },
        { name: "messages + chat_reads\n— chat & unread" },
        { name: "tasks · media · verified" }
      ]},
      { name: "Vercel + GitHub", icon: "🚀", children: [
        { name: "Commit to main →\nauto-deploy ~1 min" },
        { name: "Env vars: Mongo URI,\nKobo token, secrets" }
      ]}
    ]},
    { name: "4 · The Brain", icon: "🧩", info: "Every reading is checked the moment it's displayed.", children: [
      { name: "Field matcher", icon: "🗺️", children: [
        { name: "group_2/Readings_mm\n→ 'water level'" },
        { name: "3-pass match survives\nform renames" }
      ]},
      { name: "Red-flag engine", icon: "🚩", children: [
        { name: "Missing photo" },
        { name: "No reading in 7 days" },
        { name: "Inside level outside\n50–250 mm standard" },
        { name: "Outside ≠ 150 mm\n(± tolerance)" },
        { name: "Start / end time missing" },
        { name: "Stuck · future date ·\nout-of-sequence" }
      ]},
      { name: "Weekly targets", icon: "🎯", children: [
        { name: "1 reading / pipe / week\n(admin-adjustable)" },
        { name: "done · in progress ·\nneeds reading" }
      ]}
    ]},
    { name: "5 · What You See", icon: "🖥️", info: "Every tab, and who can see it.", children: [
      { name: "Overview", icon: "🏠", children: [
        { name: "KPIs + this-week progress\nout of ALL pipes" }
      ]},
      { name: "Submissions & Water level", icon: "📋", children: [
        { name: "Cards with both photos,\nflags, mm units" },
        { name: "Level changes between\nvisits (drying = normal)" }
      ]},
      { name: "Map", icon: "🗺️", children: [
        { name: "Blue = clean, red = flagged" },
        { name: "Street / Satellite / Topo\n+ auto tile fallback" },
        { name: "Full-info popups" },
        { name: "KML · GeoJSON · HTML export" }
      ]},
      { name: "Assignment", icon: "👥", children: [
        { name: "Assignment — done / left /\ntotal per village" },
        { name: "Team — people, villages,\npasswords (admin)" },
        { name: "Tasks — extra to-dos" }
      ]},
      { name: "Chat", icon: "💬", children: [
        { name: "Group + DMs, camera,\nvoice, files, location" },
        { name: "Unread badges +\nbrowser notifications" }
      ]},
      { name: "Kobo View (admin)", icon: "🪞", children: [
        { name: "Every answer + photos\n+ mini map per row" },
        { name: "Open in KoboToolbox\n(exact submission)" }
      ]},
      { name: "Settings (admin)", icon: "⚙️", children: [
        { name: "Pipe standards · flags ·\nadmin passwords · contacts" }
      ]}
    ]},
    { name: "6 · Data Out", icon: "📤", info: "Getting data back out for analysis and mapping.", children: [
      { name: "Excel (XLSX)", icon: "📗", children: [
        { name: "Sheet 1: all readings\nincl. Farm ID + GPS split" },
        { name: "Sheet 2: Summary —\navg/min/max per village" }
      ]},
      { name: "CSV / JSON", icon: "📊" },
      { name: "Map files", icon: "🗺️", children: [
        { name: "KML → Google Earth" },
        { name: "GeoJSON → QGIS / ArcGIS" }
      ]}
    ]},
    { name: "7 · People & Access", icon: "🔐", info: "Two roles, two very different views.", children: [
      { name: "Admins", icon: "👑", children: [
        { name: "Everything incl. flags,\nKobo View, Settings" },
        { name: "Passwords changeable\nin Settings" }
      ]},
      { name: "Surveyors", icon: "🧑‍🌾", children: [
        { name: "Only their villages" },
        { name: "No flags — clean\npositive field view" }
      ]}
    ]}
  ]
};

const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select('#svg');
const g = d3.select('#zoom-g');
const linksG = d3.select('#links-g');
const nodesG = d3.select('#nodes-g');
const tooltip = document.getElementById('tooltip');

const zoom = d3.zoom().scaleExtent([0.15, 3]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

const RADIUS = Math.min(W, H) * 0.46;

function makeTree(data) {
  const root = d3.hierarchy(data);
  root.each(d => { d._children = null; });
  root.each(d => {
    if (d.depth >= 1 && d.children) { d._children = d.children; d.children = null; }
  });
  return root;
}
const tree = d3.tree().size([2 * Math.PI, RADIUS])
  .separation((a, b) => (a.parent === b.parent ? 1 : 2) / a.depth);

let root = makeTree(RAW);

const strokeColors = ['#22c55e', '#3b82f6', '#4ade80', '#64748b'];
const nodeRadii = [26, 15, 10, 6];

let uid = 0;
function id(d) { return d.data._uid || (d.data._uid = ++uid); }
function radialPoint(x, y) { return [y * Math.cos(x - Math.PI / 2), y * Math.sin(x - Math.PI / 2)]; }

function update(source) {
  tree(root);
  const duration = 450;
  const linkPath = d3.linkRadial().angle(d => d.x).radius(d => d.y);

  const link = linksG.selectAll('path.link').data(root.links(), d => id(d.target));
  const linkEnter = link.enter().append('path').attr('class', 'link')
    .attr('d', () => { const o = { x: source._x0 ?? source.x, y: source._y0 ?? source.y }; return linkPath({ source: o, target: o }); })
    .style('opacity', 0);
  linkEnter.merge(link).transition().duration(duration).ease(d3.easeCubicInOut)
    .attr('d', linkPath).style('opacity', 1)
    .attr('stroke', d => strokeColors[Math.min(d.target.depth, 3)] + '55');
  link.exit().transition().duration(duration)
    .attr('d', () => { const o = { x: source.x, y: source.y }; return linkPath({ source: o, target: o }); })
    .style('opacity', 0).remove();

  const node = nodesG.selectAll('g.node').data(root.descendants(), d => id(d));
  const nodeEnter = node.enter().append('g')
    .attr('class', d => `node node-d${Math.min(d.depth, 3)}`)
    .attr('transform', () => {
      const [px, py] = radialPoint(source._x0 ?? source.x, source._y0 ?? source.y);
      return `translate(${px},${py})`;
    })
    .style('opacity', 0)
    .on('click', (event, d) => { event.stopPropagation(); toggle(d); })
    .on('mouseover', (event, d) => showTip(event, d))
    .on('mousemove', (event) => { tooltip.style.left = (event.clientX + 14) + 'px'; tooltip.style.top = (event.clientY + 10) + 'px'; })
    .on('mouseout', hideTip);
  nodeEnter.append('circle').attr('r', 0);
  nodeEnter.append('circle').attr('class', 'collapse-ring').attr('r', 0);
  nodeEnter.append('text');

  const nodeUpdate = nodeEnter.merge(node);
  nodeUpdate.transition().duration(duration).ease(d3.easeCubicInOut)
    .attr('transform', d => { const [px, py] = radialPoint(d.x, d.y); return `translate(${px},${py})`; })
    .style('opacity', 1);
  nodeUpdate.select('circle').transition().duration(duration)
    .attr('r', d => nodeRadii[Math.min(d.depth, 3)]);
  nodeUpdate.select('.collapse-ring').transition().duration(duration)
    .attr('r', d => d._children ? nodeRadii[Math.min(d.depth, 3)] + 4 : 0)
    .attr('stroke', d => strokeColors[Math.min(d.depth, 3)]);
  nodeUpdate.select('text').each(function (d) {
    const t = d3.select(this);
    t.selectAll('tspan').remove();
    const lines = (d.data.icon && d.depth > 0 ? d.data.icon + ' ' + d.data.name : d.data.name).split('\n');
    const onLeft = d.depth > 0 && (d.x > Math.PI);
    const r = nodeRadii[Math.min(d.depth, 3)];
    t.attr('text-anchor', d.depth === 0 ? 'middle' : (onLeft ? 'end' : 'start'));
    lines.forEach((line, i) => {
      t.append('tspan')
        .attr('x', d.depth === 0 ? 0 : (onLeft ? -(r + 8) : r + 8))
        .attr('dy', i === 0 ? `${-(lines.length - 1) * 0.55}em` : '1.1em')
        .text(line);
    });
  });
  node.exit().transition().duration(duration)
    .attr('transform', () => { const [px, py] = radialPoint(source.x, source.y); return `translate(${px},${py})`; })
    .style('opacity', 0).remove();

  root.each(d => { d._x0 = d.x; d._y0 = d.y; });
}

function toggle(d) {
  if (d.children) { d._children = d.children; d.children = null; }
  else if (d._children) { d.children = d._children; d._children = null; }
  update(d);
}
function expandAll() { root.each(d => { if (d._children) { d.children = d._children; d._children = null; } }); update(root); }
function collapseAll() { root.each(d => { if (d.depth >= 1 && d.children) { d._children = d.children; d.children = null; } }); update(root); }
function resetZoom() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2)); }
function showTip(event, d) {
  const extra = d.data.info || (d._children ? 'Tap to grow this root' : (d.children ? 'Tap to fold this root' : ''));
  if (!extra) return;
  tooltip.innerHTML = `<b>${(d.data.icon || '') + ' ' + d.data.name.replace(/\n/g, ' ')}</b><br>${extra}`;
  tooltip.style.opacity = 1;
  tooltip.style.left = (event.clientX + 14) + 'px';
  tooltip.style.top = (event.clientY + 10) + 'px';
}
function hideTip() { tooltip.style.opacity = 0; }

svg.call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2));
update(root);
</script>
</body>
</html>
